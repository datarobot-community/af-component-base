---
name: Validate Template

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Validate Template

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python & uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Install Copier
        run: |
          uv tool install copier
      - name: Install go
        uses: actions/setup-go@v5
      - name: Install yamlfmt
        run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest

      - name: Generate Test Project
        run: |
          copier copy . mytemplate --defaults

      - name: Run yamlfmt
        run: yamlfmt -conf .yamlfmt.yml -lint ./mytemplate

      - name: Generate Test Project with core
        run: |
          copier copy . mytemplate_with_core --data include_core=true --defaults

      - name: Run yamlfmt
        run: yamlfmt -conf .yamlfmt.yml -lint ./mytemplate_with_core
