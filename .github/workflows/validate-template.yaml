---
name: Validate Template

on:
  push:
    branches:
      - main
      - master

  pull_request:
    branches:
      - main
      - master

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate Template (Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python & uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Go
        uses: actions/setup-go@v5

      - name: Install yamlfmt
        run: go install github.com/google/yamlfmt/cmd/yamlfmt@latest

      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dr CLI
        run: |
          LATEST_TAG=$(curl -s https://api.github.com/repos/datarobot-oss/cli/releases/latest | grep '"tag_name"' | cut -d '"' -f 4)
          VERSION=${LATEST_TAG#v}
          curl -fsSL "https://github.com/datarobot-oss/cli/releases/download/${LATEST_TAG}/dr_v${VERSION}_Linux_x86_64.tar.gz" -o /tmp/dr.tar.gz
          tar -xzf /tmp/dr.tar.gz -C /tmp dr
          sudo mv /tmp/dr /usr/local/bin/dr
          dr --version

      - name: Validate
        run: task validate
