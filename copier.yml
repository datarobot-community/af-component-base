---
# questions
template_name:
  type: str
  default: "Amazing Recipe"
  help: "The name of your Application Template"

template_code_name:
  type: str
  default: "{{ template_name|lower|replace(' ', '-') }}"
  help: "The code friendly (lowercase, dashes/underscores instead of spaces"

oss_repo_name:
  type: str
  default: "recipe-amazing-community"
  help: "The name of your Application Template in the `datarobot-community` GitHub org"

private_repo_name:
  type: str
  default: "recipe-amazing-internal"
  help: "The name of your Application Template in the `datarobot` GitHub org"

template_description:
  type: str
  default: |
    This is an amazing application template that does wonderful things.
      * Feature 1
  help: "A Markdown-compatible description of your Application Template"

copyright_year:
  type: int
  default: 2026
  help: "The current year to register copyright properly in the license file"

github_owner_group:
  type: str
  default: "@datarobot/customer-engineering"
  help: "The GitHub team or username that will own the repository for this application template"

harness_org_id:
  type: str
  default: "No_Code_Apps"
  help: "Harness organization where project-related tasks will be executed"

include_core:
  type: bool
  default: false
  help: "Include the `core` library package for multi-component recipes?"

include_prediction_environment:
  type: bool
  default: false
  help: "Include a global prediction environment resource in the infrastructure?"


_subdirectory: template
_answers_file: .datarobot/answers/base.yml
