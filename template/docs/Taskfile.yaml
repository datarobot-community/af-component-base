---
# https://taskfile.dev
version: '3'

vars:
  BIN: "{{.TASKFILE_DIR}}/.bin"

tasks:
  install:
    desc: Install documentation dependencies
    dir: "{{.BIN}}"
    cmds:
      - uv sync

  build:
    desc: Compile component docs into README.md and static site
    dir: "{{.BIN}}"
    cmds:
      - uv run properdocs build --config-file properdocs.yml

  validate:
    desc: Validate documentation completeness and links
    dir: "{{.BIN}}"
    cmds:
      - uv run properdocs build --strict --config-file properdocs.yml

  serve:
    desc: Serve documentation locally for preview
    dir: "{{.BIN}}"
    cmds:
      - uv run properdocs serve --config-file properdocs.yml
