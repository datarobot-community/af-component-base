---
version: '3'
vars:
  # Cross-platform environment cleaning - uses 'env -u' on Unix systems, falls back to empty string on Windows
  UV_CMD:
    sh: |
      # This command ensures compatibility with codespaces environments
      # Cross-platform environment cleaning - uses 'env -u' on Unix systems,
      # falls back to empty string on Windows
      if command -v env >/dev/null 2>&1; then
        echo "env -u PYTHONPATH -u VIRTUAL_ENV uv"
      else
        echo "uv"
      fi
tasks:
  # Internal: components include this and expose via wrapper that passes --dir <component>.
  # e.g. agents-md: dir: .. ; cmds: - task: common:agents-md -- --dir mcp_server
  agents-md:
    desc: "🤖 Generate/update AGENTS.md via DataRobot LLM (internal; pass --dir <component>)"
    dir: ..
    cmds:
      - uv run scripts/generate_agents_md.py {{.CLI_ARGS}}
